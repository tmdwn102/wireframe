<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SCAN_SYSTEM</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f5; color: #1a1a1a; font-family: 'Courier New', monospace; padding: 2rem; min-height: 100vh; }
  h1 { font-size: 10px; letter-spacing: 0.2em; color: #999; margin-bottom: 2rem; }
  select, input[type=text] { background: #fff; color: #1a1a2e; border: 1px solid #ccc; padding: 0.5rem 1rem; font-family: inherit; font-size: 13px; width: 100%; margin-bottom: 1rem; border-radius: 4px; }
  .upload-area { border: 1px dashed #aaa; padding: 2rem; text-align: center; cursor: pointer; margin-bottom: 1rem; color: #888; font-size: 12px; letter-spacing: 0.05em; background: #fff; border-radius: 4px; }
  .upload-area:hover { border-color: #3a5fc8; color: #3a5fc8; }
  #preview { display: none; margin-bottom: 1rem; }
  #preview img { max-width: 160px; }
  button { width: 100%; padding: 0.7rem; background: #3a5fc8; color: #fff; border: none; font-family: inherit; font-size: 12px; letter-spacing: 0.15em; cursor: pointer; border-radius: 4px; }
  button:hover { background: #2a4fb8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .output { margin-top: 2rem; border: 1px solid #ddd; border-radius: 4px; background: #fff; }
  .output-header { padding: 0.5rem 1rem; border-bottom: 1px solid #eee; font-size: 10px; color: #999; letter-spacing: 0.15em; background: #f9f9f9; border-radius: 4px 4px 0 0; }
  .output-text { padding: 1.5rem; font-size: 13px; line-height: 2.2; color: #3a5fc8; white-space: pre-wrap; min-height: 200px; }
  .label { font-size: 10px; color: #999; letter-spacing: 0.12em; margin-bottom: 0.4rem; }
</style>
</head>
<body>

<h1>BIOMETRIC_SCAN_SYSTEM — 사물이 기억하는 초상</h1>

<div class="label">ANTHROPIC_API_KEY</div>
<input type="text" id="apiKey" placeholder="sk-ant-api03-..." />

<div class="label">ANALYSIS_TARGET</div>
<select id="partSelect">
  <option value="전체 얼굴">전체 얼굴</option>
  <option value="눈 (좌)">눈 (좌)</option>
  <option value="눈 (우)">눈 (우)</option>
  <option value="코">코</option>
  <option value="입">입</option>
</select>

<div class="label">IMAGE_INPUT</div>
<div class="upload-area" onclick="document.getElementById('fileInput').click()">
  클릭하여 이미지 로드
  <input type="file" id="fileInput" accept="image/*" style="display:none">
</div>

<div id="preview"><img id="previewImg" src="" alt=""></div>

<button id="analyzeBtn" disabled onclick="analyze()">EXECUTE_SCAN</button>

<div class="output" id="outputBox" style="display:none">
  <div class="output-header" id="outputHeader">SCAN_OUTPUT.LOG</div>
  <div class="output-text" id="outputText"></div>
</div>

<script>
  let imageBase64 = null;
  let imageMime = 'image/jpeg';

  document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    imageMime = file.type || 'image/jpeg';
    const reader = new FileReader();
    reader.onload = function(ev) {
      imageBase64 = ev.target.result.split(',')[1];
      document.getElementById('previewImg').src = ev.target.result;
      document.getElementById('preview').style.display = 'block';
      document.getElementById('analyzeBtn').disabled = false;
    };
    reader.readAsDataURL(file);
  });

  async function analyze() {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { alert('API 키를 입력하세요'); return; }

    const btn = document.getElementById('analyzeBtn');
    const outputBox = document.getElementById('outputBox');
    const outputText = document.getElementById('outputText');
    const outputHeader = document.getElementById('outputHeader');
    const part = document.getElementById('partSelect').value;

    btn.disabled = true;
    btn.textContent = 'SCANNING...';
    outputBox.style.display = 'block';
    outputText.textContent = '> 데이터 수집 중...\n> 감정 필터 제거 중...\n> 수치 변환 중...';

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 800,
          system: `당신은 감정이 없는 생체 스캐닝 시스템입니다. 규칙: 감정 형용사 절대 사용 금지. [부위] : [수치 또는 방향 또는 상태] 형식으로만 출력. 한국어. 6~8개 항목. 각 항목 한 줄. 가능하면 mm·도(°)·% 단위 추정값 포함.`,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageBase64 } },
              { type: 'text', text: `이 이미지의 [${part}] 부위를 스캔하여 데이터를 출력하라.` }
            ]
          }]
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error?.message || JSON.stringify(data));

      const text = data.content?.[0]?.text || '출력 없음';
      const now = new Date();
      outputHeader.textContent = `SCAN_OUTPUT.LOG  ·  ${now.toLocaleTimeString('ko-KR')}`;
      outputText.textContent = `[SUBJECT: UNKNOWN]\n[PART: ${part}]\n[STATUS: COMPLETE]\n\n` + text;

    } catch (err) {
      outputText.textContent = `[ERROR]\n\n${err.message}`;
    }

    btn.disabled = false;
    btn.textContent = 'EXECUTE_SCAN';
  }
</script>
</body>
</html>
